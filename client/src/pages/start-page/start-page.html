<div class="welcome-msg">
  <h1>Welcome to Movie Trivia</h1>
  <p>Test your knowledge of movies and actors!</p>
  <p>Please enter your name and click the button below to begin.</p>
  <form [formGroup]="nameForm">
    <div class="form-group">
      <input type="text" formControlName="playerName" placeholder="Enter your name" />

      @if (!joined()) {
        <button
          type="button"
          [disabled]="nameForm.controls.playerName.invalid"
          (click)="joinAndContinue()"
        >
          Continue
        </button>
      } @else if (isLeader()) {
        <select formControlName="category">
          @for (category of categories; track category.id) {
            <option [value]="category.id">{{ category.name }}</option>
          }
        </select>
        <button (click)="goToLobby()">Join Lobby</button>
      } @else {
        <p>Waiting for {{ signalRService.hostName() }} to pick a category&hellip;</p>
        <button (click)="goToLobby()">Join Lobby</button>
      }
    </div>
  </form>
</div>
